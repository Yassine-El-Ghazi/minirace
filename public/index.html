<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MineRace – Blockchain Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <h1>Mine<span>Race</span></h1>
  <div id="chain-status" class="valid">Chain: Valid</div>
  <a href="/admin.html" class="admin-link">Admin</a>
</header>

<main>
  <!-- ── Left sidebar ──────────────────────────────────────────────── -->
  <div id="sidebar">

    <!-- Chain info -->
    <div class="panel" id="panel-info">
      <h2>Chain</h2>
      <div class="info-row"><span>Height</span><span id="info-height">–</span></div>
      <div class="info-row"><span>Difficulty</span><span id="info-difficulty">–</span></div>
      <div class="info-row"><span>Reward</span><span id="info-reward">–</span></div>
      <div class="info-row"><span>Avg block time</span><span id="info-avgtime">–</span></div>
    </div>

    <!-- Mempool -->
    <div class="panel" id="panel-mempool">
      <h2>Mempool <span id="mempool-count" class="badge">0</span></h2>
      <div id="mempool-list">
        <div class="empty-msg">No pending transactions</div>
      </div>
    </div>

    <!-- Known addresses -->
    <div class="panel" id="panel-addresses">
      <h2>Known Addresses</h2>
      <div style="overflow-x:auto">
        <table id="address-table">
          <thead>
            <tr>
              <th>Address</th>
              <th>Balance</th>
            </tr>
          </thead>
          <tbody id="address-table-body">
            <tr><td colspan="2" class="empty-msg">No addresses yet</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div><!-- /sidebar -->

  <!-- ── Explorer ───────────────────────────────────────────────────── -->
  <div id="explorer-area">
    <div id="chain-canvas-wrap">
      <canvas id="chain-canvas"></canvas>
    </div>
    <div id="legend"></div>

    <!-- Leaderboard -->
    <div class="panel" id="leaderboard">
      <h2>Leaderboard</h2>
      <table>
        <thead>
          <tr>
            <th>Miner</th>
            <th>Blocks</th>
            <th>Earnings (coins)</th>
          </tr>
        </thead>
        <tbody id="leaderboard-body"></tbody>
      </table>
    </div>
  </div>

</main>

<!-- Block detail popup -->
<div id="overlay"></div>
<div id="block-detail">
  <button class="close-btn" id="close-block-detail">✕</button>
  <h3>Block Detail</h3>
  <div id="block-detail-content"></div>
</div>

<script src="app.js"></script>
</body>
</html>
